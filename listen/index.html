<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream WHOSRILA</title>
<meta name="description" content="Stream WHOSRILA on Spotify, Apple Music, Tidal, Deezer, Audiomack, YouTube Music and Amazon Music.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Whosrila';
  src: url('/fonts/whosrila.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
:root {
  --ink: #0A0A0A;
  --ink-2: #161616;
  --paper: #F4F4F2;
  --paper-dim: #8C8C8C;
  --red: #D7263D;
  --line: rgba(244,244,242,0.14);
  --f-display: 'Whosrila', 'Anton', sans-serif;
  --f-body: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --f-mono: 'Space Mono', monospace;
  --maxw: 1140px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--ink); color: var(--paper); font-family: var(--f-body); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
img, svg { display: block; max-width: 100%; }
::selection { background: var(--red); color: var(--ink); }

/* ---- Nav ---- */
header.site {
  position: sticky; top: 0; z-index: 50;
  background: rgba(10,10,10,0.86);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line);
}
.navrow { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; }
.wordmark img.logo-nav { height: 24px; width: auto; display: block; }
nav.links { display: flex; gap: 28px; font-family: var(--f-mono); font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; }
nav.links a { opacity: 0.78; transition: opacity .2s; border-bottom: 1px solid transparent; padding-bottom: 3px; }
nav.links a:hover { opacity: 1; border-color: var(--red); }
.burger { display: none; background: none; border: 0; color: var(--paper); font-size: 22px; cursor: pointer; }
@media (max-width: 760px) {
  nav.links { display: none; }
  .burger { display: block; }
  .navrow.open + .mobilenav { display: flex; }
}
.mobilenav { display: none; flex-direction: column; gap: 0; border-top: 1px solid var(--line); }
.mobilenav a { padding: 16px 28px; font-family: var(--f-mono); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid var(--line); }

/* ---- Hero ---- */
.hero { padding: 72px 28px 48px; text-align: center; max-width: 680px; margin: 0 auto; width: 100%; }
.stamp {
  font-family: var(--f-mono); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--red); display: inline-flex; align-items: center; gap: 10px; margin-bottom: 24px;
}
.stamp::before, .stamp::after { content: "\25B8"; opacity: 0.6; font-size: 10px; }
.stamp::after { content: "\25C2"; }
.hero h1 { font-family: var(--f-display); font-size: clamp(42px, 10vw, 80px); letter-spacing: 0.04em; line-height: 1; margin-bottom: 14px; font-weight: 400; }
.hero p { color: var(--paper-dim); font-family: var(--f-mono); font-size: 13px; letter-spacing: 0.06em; }

/* ---- Platforms ---- */
.platforms { flex: 1; max-width: 680px; width: 100%; margin: 0 auto; padding: 0 28px 80px; }
.platform-link {
  display: flex; align-items: center; gap: 20px; padding: 20px 24px;
  border: 1px solid var(--line); border-radius: 4px; text-decoration: none;
  color: var(--paper); margin-bottom: 12px; transition: background .2s, border-color .2s;
}
.platform-link:hover { background: rgba(244,244,242,0.06); border-color: rgba(244,244,242,0.28); }
.platform-link:hover .arrow { opacity: 1; }
.platform-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.platform-name { font-family: var(--f-display); font-size: 20px; letter-spacing: 0.02em; font-weight: 400; }
.platform-sub { font-size: 11px; color: var(--paper-dim); font-family: var(--f-mono); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
.platform-info { flex: 1; }
.arrow { font-size: 18px; color: var(--paper-dim); opacity: 0.4; transition: opacity .2s; }
.ic-spotify  { background: #1DB954; }
.ic-apple    { background: #fc3c44; }
.ic-tidal    { background: #000; border: 1px solid #444; }
.ic-deezer   { background: #A238FF; }
.ic-audiomack{ background: #F4820C; }
.ic-youtube  { background: #FF0000; }
.ic-amazon   { background: #25D1DA; }

/* ---- Footer ---- */
footer { text-align: center; padding: 28px; border-top: 1px solid var(--line); font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--paper-dim); }
footer a { color: var(--paper-dim); }
footer a:hover { color: var(--paper); }

@media (max-width: 480px) {
  .navrow { padding: 14px 20px; }
  .hero { padding: 52px 20px 36px; }
  .platforms { padding: 0 20px 60px; }
  .platform-link { padding: 16px 18px; gap: 14px; }
}
</style>
</head>

<script>
const burger = document.getElementById('burgerBtn');
const navrow = document.getElementById('navrow');
burger.addEventListener('click', () => {
  const open = navrow.classList.toggle('open');
  burger.setAttribute('aria-expanded', open);
});
</script>
