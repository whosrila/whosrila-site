:root{
  --ink:        #0A0A0A;
  --ink-2:      #161616;
  --paper:      #F4F4F2;
  --paper-dim:  #8C8C8C;
  --red:        #D7263D;
  --line:       rgba(10,10,10,0.12);

  --f-display: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --f-body:    'Helvetica Neue', Helvetica, Arial, sans-serif;
  --f-mono: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}
*{ box-sizing:border-box; }
body{
  margin:0; background:var(--paper); color:var(--ink);
  font-family:var(--f-body); font-size:17px; line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh; display:flex; flex-direction:column;
}
a{ color:inherit; text-decoration:none; }
::selection{ background:var(--red); color:var(--ink); }
:focus-visible{ outline:2px solid var(--red); outline-offset:3px; }

.wrap{ width:100%; max-width:560px; margin:0 auto; padding:0 24px; }

header.site{ position:sticky; top:0; z-index:100; background:var(--paper); border-bottom:1px solid var(--line); }
.navrow{ display:flex; align-items:center; justify-content:space-between; padding:16px 28px; }
.logo-link img{ height:22px; width:auto; display:block; filter:invert(1); }
nav.links{ display:flex; gap:28px; font-family:var(--f-mono); font-size:13px; letter-spacing:0.06em; text-transform:uppercase; }
nav.links a{ opacity:1; color:var(--ink); transition:opacity .2s; border-bottom:1px solid transparent; padding-bottom:3px; }
nav.links a:hover{ opacity:1; border-color:var(--red); }
.burger{ display:none; background:none; border:0; color:var(--ink); font-size:22px; cursor:pointer; padding:0; line-height:1; }
@media (max-width:760px){
  nav.links{ display:none; }
  .burger{ display:block; }
}
.mobilenav{
  display:none; flex-direction:column; gap:0; border-top:1px solid var(--line);
}
.mobilenav a{
  padding:16px 28px; font-family:var(--f-mono); font-size:13px; letter-spacing:0.08em; text-transform:uppercase;
  border-bottom:1px solid var(--line);
}

main{ flex:1; display:flex; align-items:flex-start; padding:24px 0 48px; }

.stamp{
  font-family:var(--f-mono); font-size:12px; letter-spacing:0.16em; text-transform:uppercase;
  color:var(--red); display:inline-flex; align-items:center; gap:10px; margin-bottom:18px;
}
.stamp::before,.stamp::after{ content:"\25B8"; opacity:0.6; font-size:10px; }
.stamp::after{ content:"\25C2"; }

h1.title{
  font-family:var(--f-display); font-weight:400; font-size:clamp(24px,4vw,36px);
  line-height:0.92; margin:0 0 18px; text-transform:uppercase;
}
p.hook{ color:var(--paper-dim); font-size:18px; max-width:440px; margin:0 0 30px; }

.countdown{ display:flex; gap:18px; margin:0 0 32px; }
.countdown .cell{ text-align:center; }
.countdown .num{ font-family:var(--f-display); font-size:34px; line-height:1; }
.countdown .lab{ font-family:var(--f-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--paper-dim); }

.embed-frame{
  border:1px solid var(--line); border-radius:6px; overflow:hidden; background:var(--paper);
  margin-bottom:16px;
}
.embed-frame iframe{ display:block; width:100%; border:0; }

.fallback{
  font-family:var(--f-mono); font-size:12px; letter-spacing:0.04em; color:var(--paper-dim);
  text-align:center; margin-bottom:8px;
}
.fallback a{ border-bottom:1px solid var(--red); color:var(--paper); padding-bottom:1px; }
.fallback a:hover{ color:var(--red); }

footer.mini{
  padding:24px 0; border-top:1px solid var(--line);
  font-family:var(--f-mono); font-size:11px; color:var(--paper-dim);
  display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
}
footer.mini a{ border-bottom:1px solid var(--line); }
footer.mini a:hover{ color:var(--paper); border-color:var(--paper); }
.h2 { font-size: clamp(24px,3.5vw,38px); }

h1, h2, h3, .h1, .h2, .h3, .title { filter: brightness(0); }

.preview-player{
  display:flex; align-items:center; gap:16px;
  padding:16px 20px; margin-bottom:16px;
  border:1px solid var(--line); border-radius:6px; background:var(--paper);
}
.preview-btn{
  width:44px; height:44px; border-radius:50%; flex-shrink:0;
  border:2px solid var(--ink); background:transparent; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--ink); transition:background .2s, border-color .2s, color .2s;
}
.preview-btn:hover,.preview-btn.playing{
  background:var(--red); border-color:var(--red); color:#fff;
}
.preview-meta{ display:flex; flex-direction:column; gap:2px; }
.preview-tag{
  font-family:var(--f-mono); font-size:11px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--paper-dim);
}

</style>
</head>
